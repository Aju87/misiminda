[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect rules handled by Next.js middleware — no manual redirects needed

[context.production.environment]
  NEXT_PUBLIC_APP_URL = "https://misiminda.netlify.app"

[context.deploy-preview.environment]
  NEXT_PUBLIC_APP_URL = "https://misiminda.netlify.app"
